<!DOCTYPE html>
<html>
  <head>
    <title>
      2026 Assembly Election Results
    </title>
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no" />
    <meta content="text/html;charset=utf-8" http-equiv="Content-Type" />
    <meta content="utf-8" http-equiv="encoding" />
    <link rel="preconnect" crossorigin="" href="https://akm-img-a-in.tosshub.com" />
    <link rel="preconnect" crossorigin="" href="https://electionresults.intoday.in" />
    <style>
      html, body {
        overflow: hidden;
        height: auto;
		touch-action: pan-y;
      }
      :root {
        --theme-color: #d22423;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-size: 100%;
        font-family: "Rubik", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu,
          Cantarell, "Open Sans", "Helvetica Neue", sans-serif;
      }
      .img-comp-container .img-comp-img svg {
        width: 700px;
        height: 600px;
     }

      .elecResults {
        margin: 0px;
        padding: 20px;
        width: 100%;
        border: 1px solid #e2e2e2;
        border-top-width: 6px;
        border-radius: 0 0 8px 8px;
        overflow: hidden;
		touch-action: pan-y;
      }
      .elecResults * {
        box-sizing: border-box;
      }
      .elecResults a {
        text-decoration: none;
      }
      .elecResults h3 {
        margin: 0px;
        padding: 0px 0 15px 0;
        font-size: 22px;
        text-align: center;
        font-weight: 700;
        margin-bottom: 5px;
        color: #000;
      }
      .elecResults .tabArea{ margin-bottom:30px;}
      .elecResults .tabArea ul#tabs {
        list-style-type: none;
        margin: 0px 0 0 0;
        padding-left: 0px;
        position: relative;
      }
      .elecResults .tabArea ul#tabs li {
        display: inline;
        font-size: 16px;
        font-weight: 700;
      }
      .elecResults .tabArea ul#tabs li span {
        font-weight: 400;
      }
      .elecResults .tabArea ul#tabs li a {
        color: #a1a5b7;
        text-decoration: none;
        font-size: 18px;
        padding: 0px 10px 6px;
      }
      .elecResults .tabArea ul#tabs li a.selected {
        font-size: 22px;
        border-bottom: 3px solid var(--theme-color);
        color: #1d1d1f;
      }

      .elecResults .tabArea div.tabContent {
        background-color: #fff;
        margin-top: 1.5px;
        padding: 10px 0 0;
        overflow: hidden;
      }
      .elecResults .tabArea div.tabContent.hide {
        display: none;
      }

      /* MAP AREA */
      .elecResults .mapArea {
        margin: 0px;
        padding: 0px;
        float: left;
        width: 30%;
      }
      .elecResults .mapArea img {
        width: 100%;
      }
      .stateMob {
        display: none;
      }

      @media (max-width: 768px) {
        .elecResults {padding: 10px;}        
      }
      @media screen and (max-width: 1024px) {
        .elecResults .tabArea ul#tabs li {font-size: 12px;}
        .elecResults .tabArea div.tabContent {margin-top: 1px;}
      }
      @media screen and (max-width: 728px) {
        .elecResults .tabArea div.tabContent {padding-left: 0px;padding-right: 0px;}
        .elecResults .tabArea ul#tabs {display: none;}
        .elecResults .tabArea div.tabContent {
          padding-left: 0px;
          padding-right: 0px;
        }
        .elecResults .mapArea {
          padding: 0px 10px;
        }
        .elecResults .mapArea {
          float: none;
          width: 100%;
          margin: 0px 0 15px 0;
        }
        .elecResults .partPosi {
          float: none;
          width: 100%;
          margin: 0px;
        }
        .elecResults .storyList {
          float: none;
          width: 100%;
          padding: 0px 10px;
          margin-top: 3px;
        }
        .elecResults .partPosi h2 {
          display: block;
          font-size: 20px;
        }
        .elecResults .partPosi table {
          font-size: 14px;
        }
        .elecResults .storyList ul li {
          font-size: 14px;
          line-height: 18px;
        }
        .elecResults .storyList ul li:nth-child(3n) {
          border-bottom: 1px solid #dbdbdb;
        }
        .elecResults .storyList ul li:nth-child(4n) {
          display: block;
        }

        .elecResults .tabArea ul#tabs {
          display: none;
        }
        .stateMob {
          display: block;
          padding: 5px 20px;
          border: 1px solid #d9d9d9;
          height: 42px;
          width: 100%;
          border-radius: 6px;
          background-color: #fff;
          position: relative;
        }
        .stateMob:after {
          content: "";
          position: absolute;
          right: 20px;
          border: 2px solid #111;
          border-width: 0 2px 2px 0;
          display: inline-block;
          padding: 3px;
          transform: translateY(-50%) rotate(45deg);
          top: calc(50% - 1px);
          border-bottom-left-radius: 0;
          border-bottom-right-radius: 0;
          cursor: pointer;
        }
        .stateMob select {
          font-size: 18px;
          color: #181c32;
          text-transform: capitalize;
          width: 100%;
          display: block;
          box-sizing: border-box;
          background-color: #fff;
          border: 0px;
          font-weight: bold;
          height: 30px;
          -webkit-appearance: none;
        }
        .stateMob select:focus-visible {
          outline: 0;
        }
      }

      .main_section {
        padding: 20px 20px 10px;
        border: 1px solid #e2e2e2;
        border-top-width: 6px;
        border-radius: 0 0 8px 8px;
        background-color: #fff;
      }

      .img-comp-container {
        position: relative;
        height: 520px;
        width: 500px;
      }

      .img-comp-img {
        position: absolute;
        width: auto;
        height: auto;
        overflow: hidden;
      }

      .img-comp-img svg {
        display: block;
        vertical-align: middle;
      }

      .img-comp-slider {
        position: absolute;
        z-index: 9;
        cursor: ew-resize;
        background-color: transparent;
        opacity: 1;
        height: 100%;
        width: 40px;
        background-image: url(https://akm-img-a-in.tosshub.com/sites/test/election-dashboard-2024/img/drager_.png);
        background-size: 40px;
        background-repeat: no-repeat;
        background-position: left bottom 30px;
      }
      .img-comp-slider::after {
        content: var(--curr-year, "2026");
        position: absolute;
        left: 20px;
        top: 5px;
        transform: translateY(0%);
        font-weight: 600;
        font-size: 18px;
        padding: 5px 10px;
        color: #000;
        border-radius: 0 10px 10px 0;
        background-color: rgba(255, 255, 255, 0.7);
        -webkit-box-shadow: rgba(0, 0, 0, 0.35) 0px 0px 7px;
        -moz-box-shadow: rgba(0, 0, 0, 0.35) 0px 0px 7px;
        box-shadow: rgba(0, 0, 0, 0.35) 0px 0px 7px;
      }
      .img-comp-slider::before {
        content: var(--prev-year, "2021");
        position: absolute;
        left: -45px;
        top: 0;
        transform: translateY(0%);
        font-weight: 600;
        font-size: 18px;
        padding: 5px 10px;
        color: #000;
        border-radius: 10px 0 0 10px;
        background-color: rgba(255, 255, 255, 0.7);
        -webkit-box-shadow: rgba(0, 0, 0, 0.35) 0px 0px 7px;
        -moz-box-shadow: rgba(0, 0, 0, 0.35) 0px 0px 7px;
        box-shadow: rgba(0, 0, 0, 0.35) 0px 0px 7px;
      }
      .img-comp-img div svg {
        height: 100%;
        width: 100%;
      }
      .top_election {
        background: #b00205;
        color: #fff;
        font-size: 14px;
        text-decoration: none;
        font-weight: 600;
        padding: 3px 5px;
        display: inline-block;
        margin-bottom: 8px;
        position: relative;
        text-transform: uppercase;
        white-space: nowrap;
        margin-left: 0px;
        display: none;
      }
      .wapper_map {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 50px;
        margin-bottom: 10px;
      }
      .tally_table {
        min-height: 233px;
      }
      .table_cont {
        height: calc(100% - 66px);
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
        margin-bottom: 20px;
        min-height: 288px;
      }
      .tbhead {
        border-radius: 4px 4px 0px 0px;
        background: var(--theme-color);
        box-shadow: 1px 1px 3px 0px rgba(0, 0, 0, 0.1);
        color: #fff;
        flex: 1;
      }
      .tbhead span {
        font-size: 20px;
        font-style: normal;
        font-weight: 600;
        line-height: 130%;
        padding: 10px 12px;
        display: flex;
        align-items: center;
        min-width: 70px;
      }
      .tbhead span:first-child {
        min-width: 93px;
      }
      .tbhead span:not(:first-child) {
        justify-content: center;
      }
      .tbhead span:not(:last-child),
      .tbrow span:not(:last-child) {
        border-right: 2px solid #fff;
      }
      .tbhead,
      .tbrow {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
      }
      .tbbody {
        display: flex;
        flex-direction: column;
        height: 100%;
      }
      .tbrow {
        flex: 1;
      }
      .tbrow span {
        color: #3a3a3a;
        font-size: 20px;
        font-weight: 600;
        padding: 10px 12px;
        display: flex;
        align-items: center;
        min-width: 70px;
      }
      .tbrow span:not(:first-child) {
        justify-content: center;
        font-size: 22px;
      }
      .tbrow span:first-child {
        color: var(--partycolor);
        position: relative;
        display: flex;
        align-items: center;
        font-weight: 500;
        min-width: 93px;
      }
      .tbrow span:first-child::before {
        content: "";
        display: block;
        width: 10px;
        height: 10px;
        border-radius: 100%;
        background-color: var(--partycolor);
        margin-right: 5px;
        flex-shrink: 0;
      }
      .tbrow:nth-child(odd) {
        background-color: #eef3f6;
      }
      .tbrow:nth-child(even) {
        background-color: #fbfbfb;
      }
      .img-comp-overlay {
        border-right: 1px solid lightgray;
      }
      .img-comp-overlay svg path {
        cursor: pointer;
      }
      @media (min-width:1001px) {
        .wapper_map {justify-content: space-between;}
           .img-comp-container {
            width: 700px;
            height:610px;
            }
        
      }
      @media (min-width: 1030px) and (max-width: 1199px) {
           .wapper_map {justify-content: space-between;}
           .img-comp-container {
            width: 700px;
            height:610px;
            }
          }
      @media (max-width: 1000px) {
        .img-comp-container {
          width: 385px;
          height: 467px;
        }
        .img-comp-container .img-comp-img svg {
          width: 360px;
          height:467px;
        }
      }

      @media (max-width: 680px) {
        .img-comp-slider {
          background-size: 35px;
          background-position: left bottom 4px;
        }
        .img-comp-container {
          width: 230px;
          height: 290px;
          margin-left: 0;
        }
        .img-comp-container .img-comp-img svg {
          width: 230px;
          height: 270px;
        }
        .main_section {
          padding: 15px 10px 10px;
        }
        .wapper_map {
          flex-direction: column;
          grid-row-gap: 20px;
        }
        .img-comp-slider::after,
        .img-comp-slider::before {
          font-size: 12px;
        }
        .img-comp-slider::before {
          left: -30px;
        }
        .table_cont {
          min-height: 135px;
          justify-content: flex-start;
          margin-bottom: 0;
        }
        .tally_table {
          min-height: unset;
          width: 100%;
        }
        .tbhead span,
        .tbrow span {
          padding: 6px 12px;
          font-size: 17px;
        }
        .tbrow span:not(:first-child) {
          font-size: 20px;
        }
      }
      #tooltip-container .closebut {
        position: absolute;
        width: 20px;
        height: 20px;
        background: #000;
        color: #fff;
        text-align: center;
        border-radius: 100%;
        font-size: 13px;
        line-height: 20px;
        right: 0;
        top: -12px;
        cursor: pointer;
      }

      #tooltip-container {
        position: absolute;
        background: #fff;
        color: #000;
        padding: 23px 8px 8px;
        border-radius: 4px;
        display: none;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.5);
        z-index: 99;
        min-width: 120px;
        max-width: 200px;
        margin-right: 30px;
      }
      .year_title {
        position: absolute;
        top: 0;
        background-color: #c00;
        color: #fff;
        left: 0;
        font-size: 14px;
        padding: 1px 5px;
        font-weight: 500;
        border-radius: 0 0 5px 0;
      }
      .consname {
        font-size: 14px;
        line-height: 1.2;
        font-weight: 600;
        text-transform: uppercase;
        padding-bottom: 5px;
        text-align: center;
        word-break: break-word;
      }

      .partyname img {
        height: 35px;
        width: 35px;
      }

      .partyname .status_logo {
        height: 20px;
        width: 20px;
      }

      .partyname {
        text-align: center;
        font-size: 15px;
        font-weight: 400;
        display: flex;
        gap: 5px;
        align-items: center;
        justify-content: center;
      }
      .candidate_name {
        text-align: center;
      }
      .status {
        text-align: center;
      }
      @media (max-width: 600px) {
        #tooltip-container {
          right: 5vw;
          margin-right: 0px;
        }
      }

      .img-comp-img svg .st0 {
        fill: #fff;
      }

      #disclaimer {
        display: block;
        flex-basis: 100%;
        font-size: 12px;
        color: #4a4a4a;
        text-align: center;
      }

      .tbrow span a {
        text-decoration: none;
        font-weight: 600;
        color: inherit;
      }
    </style>
  </head>
  <body>
    <div class="elecResults">
      <div class="tabArea">
        <div class="stateMob">
          <select id="assembly-states">
          </select>
        </div>
        <!--end mobile tab menu -->
        <ul id="tabs">
        </ul>
        <!--end tab menu -->
      </div>
      <div class="wapper_map">
        <div id="tooltip-container">
        </div>
        <div class="img-comp-container">
          <div class="img-comp-img" id="svg_one">
          </div>
          <div class="img-comp-img img-comp-overlay" id="svg_two">
          </div>
        </div>
        <div class="tally_table">
          <div class="table_cont">
            <div class="tbbody" id="tally_table">
            </div>
          </div>
        </div>
      </div>
      <p id="disclaimer">
      </p>
    </div>
    <script>
      const queryString = window.location.search;
      const urlParams = new URLSearchParams(queryString);
      const site = urlParams.get("site");
      const device = urlParams.get("device");
      if (device == "app") {
                document.head.appendChild(Object.assign(document.createElement('style'),{textContent:'.main_section{min-height:500px}'}));         
        }

      if (
        site == "at" ||
        site == "gnt" ||
        site == "mptak" ||
        site == "uptak" ||
        site == "lallantop" ||
        site == "chhattisgarhtak" ||
        site == "crimetak" ||
        site == "newstak" ||
        site == "rajasthantak"
      ) {
        document.getElementById("disclaimer").innerHTML ="";
      }
      let contentData,
        allData = {};
      let svgOne = document.getElementById("svg_one");
      let svgTwo = document.getElementById("svg_two");
      let tallyTable = document.getElementById("tally_table");
      function initComparisons() {
        var x, i;
        x = document.getElementsByClassName("img-comp-overlay");
        for (i = 0; i < x.length; i++) {
          compareImages(x[i]);
        }
        function compareImages(img) {            
          var slider,
            img,
            clicked = 0,
            w,
            h;
          w = img.parentElement.offsetWidth;
          h = img.offsetHeight;
          img.style.width = w / 2 - 50 + "px";
          document.querySelectorAll(".img-comp-slider").forEach(el => el.remove());
          slider = document.createElement("DIV");
          slider.setAttribute("class", "img-comp-slider");
          img.parentElement.insertBefore(slider, img);
          slider.style.top = "2px";
          slider.style.left = img.offsetWidth - slider.offsetWidth / 2 + "px";
          slider.addEventListener("mousedown", slideReady);
          window.addEventListener("mouseup", slideFinish);
          slider.addEventListener("touchstart", slideReady);
          window.addEventListener("touchend", slideFinish);
          function slideReady(e) {
            e.preventDefault();
            clicked = 1;
            window.addEventListener("mousemove", slideMove);
            window.addEventListener("touchmove", slideMove);
          }
          function slideFinish() {
            clicked = 0;
          }
          function slideMove(e) {
            var pos;
            if (clicked == 0) return false;
            pos = getCursorPos(e);
            if (pos < 0) pos = 0;
            if (pos > w) pos = w;
            slide(pos);
          }
          function getCursorPos(e) {
            var a,
              x = 0;
            e = e.changedTouches ? e.changedTouches[0] : e;
            a = img.getBoundingClientRect();
            x = e.pageX - a.left;
            x = x - window.pageXOffset;
            return x;
          }
          function slide(x) {
            img.style.width = x + "px";
            slider.style.left = img.offsetWidth - slider.offsetWidth / 2 + "px";
          }
        }
      }

      const fetchMapData = async () => {
        const response = await fetch(
          `https://akm-img-a-in.tosshub.com/sites/elections/final-svg-${feedyear}/assembly-elections/${selectedTab}-assembly.json?v=1.3`
        );
        const data = await response.json();
        if (data.status_code == 1) {
          svgOne.style.width = "";
          svgTwo.style.width = "";
          document.querySelectorAll(".img-comp-slider").forEach((el) => el.remove());
          svgOne.innerHTML = `${data.loksabha.htm}`;
          svgTwo.innerHTML = `${data.loksabha.htm}`;
          initComparisons();
          fetchSeatData(curryear);
          fetchSeatData(prevYear);
        }
      };

      const fetchSeatData = (year) => {
        let svgId = "svg_one";
		var d = new Date();
        var n = d.getTime();
        let url =
          `https://electionresults.intoday.in/elections/${feedyear}/assembly-elections/json/ei-dashboard/${curryear}/seats/${selectedTab}-seat-matrix.json?rand=`+n;
        if (year == prevYear) {
          url =
            `https://electionresults.intoday.in/elections/${feedyear}/assembly-elections/json/ei-dashboard/${prevYear}/seats/${selectedTab}-seat-matrix.json?v=53`;
          svgId = "svg_two";
        }
        fetch(url)
          .then((response) => {
            return response.json();
          })
          .then((data) => {
            let tempData = data.data.seat_data;

            if (year == prevYear) {
              allData[prevYear] = data.data.seat_data;
            } else {
              allData[curryear] = data.data.seat_data;
            }

            if (year != prevYear) {
              contentData = data.data;
			  
              tallyTable.innerHTML = ` <div class="tbhead"><span>Party</span><span>${prevYear}</span><span>${year}</span></div>`;
              
              for (let partyData of contentData.overall_seat_distribution[0].party_detail) {
                tallyTable.innerHTML += `<div class="tbrow" style="--partycolor: ${partyData.party_color}"><span>${partyData[changeContentLanguage('party_name')]}
                    </span> <span>${partyData.last_won}</span> <span>${partyData.current_total}</span></div>`;
              }
            }
            fillMap(svgId, tempData);
            addTooltip(year);
          })
          .catch((err) => console.log(err));
      };

      const fillMap = (id, data) => {
        const svgContainer = document.getElementById(id);
        let mainSvg = svgContainer.getElementsByTagName("svg")[0];
        for (let partyData of data) {
          let color = partyData.party_color || partyData.color_code;
          let tempId = partyData.id;
          let element = mainSvg.getElementById(`cons${tempId}`);

          let similarElements = mainSvg.querySelectorAll(`path[id*="cons${tempId}_"]`);
          if (similarElements?.length > 0) {
            for (let tempElement of similarElements) {
              tempElement.style.fill = color;
            }
          }
          if (element) {
            element.style.fill = color;
          }
        }
      };

      function hideTooltip() {
        tooltipContainer.style.display = "none";
      }

      function removeConsonants(inputString) {
        return inputString.replace(/[^0-9]/g, "");
      }

      function addTooltip(year) {
        let tempData = allData[curryear];
        let svgContainer = document.getElementById("svg_one");
        if (year == prevYear) {
          svgContainer = document.getElementById("svg_two");
          tempData = allData[prevYear];
        }
        let mainSvg = svgContainer.getElementsByTagName("svg")[0];
        const paths = mainSvg.querySelectorAll("path");
        paths.forEach((path, index) => {
          path.addEventListener("click", (event) => {
            let tempConstituencyData = tempData.filter((item) => {
              return item.id == removeConsonants(event.target.getAttribute("id"));
            })[0];
            const content = `<span class="closebut" onclick="hideTooltip()">x</span> <div class="consname">${
              tempConstituencyData.seat_name
            } (${tempConstituencyData.state_name})</div>
            <div class="candidate_name">${
              tempConstituencyData.candidate_name ? tempConstituencyData.candidate_name : ""
            }</div>
            <div class="partyname"><img src=${tempConstituencyData.party_logo}></img> ${
              tempConstituencyData.party_name
            } ${
              tempConstituencyData.status_logo
                ? `<img class="status_logo" src=${tempConstituencyData.status_logo}></img>`
                : ""
            }</div>
            
            <div class="status">${tempConstituencyData.status ? tempConstituencyData.status : ""}</div>
            <div class="year_title">${year ? year : curryear}</div>`;
            showTooltip(content);
          });
        });
      }

      window.onresize = function (event) {
        
      };

      const tooltipContainer = document.getElementById("tooltip-container");

      function showTooltip(content) {
        tooltipContainer.innerHTML = content;
        tooltipContainer.style.display = "block";
      }

      function getQueryVariable(variable) {
        var query = window.location.search.substring(1);
        var vars = query.split("&");
        for (var i = 0; i < vars.length; i++) {
          var pair = vars[i].split("=");
          if (pair[0] == variable) {
            return pair[1];
          }
        }
        return false;
      }

      const changeContentLanguage = (key) => {
        const site = getQueryVariable("site");
        let keyName = key;
        if (
          site == "at" ||
          site == "gnt" ||
          site == "mptak" ||
          site == "uptak" ||
          site == "lallantop" ||
          site == "chattisgarhtak" ||
          site == "crimetak" ||
          site == "newstak" ||
          site == "rajasthantak"
        ) {
          keyName += "_h";
          document.body.classList.add('lang_hi');
        }
        return keyName;
      };
      const normalizeStateName = (value) => {
        const rawState = (value || "").toString().trim().toLowerCase();
        const decodedState = decodeURIComponent(rawState);
        const stateAliasMap = {
          kerala: "keralam",
          keralam: "keralam",
        };
        return stateAliasMap[decodedState] || decodedState;
      };
      const queryState = normalizeStateName(getQueryVariable("state") || "west-bengal");
      const curryear = getQueryVariable("year") || new Date().getFullYear();
      const prevYear = getQueryVariable("prevyear") || curryear - 5;
      const feedyear = getQueryVariable("feedyear") || new Date().getFullYear();
      document.documentElement.style.setProperty('--curr-year', `"${curryear}"`);
      document.documentElement.style.setProperty('--prev-year', `"${prevYear}"`);
      const tabsStatus = (getQueryVariable("tabs") || 'show').toLowerCase();
      let selectedTab = queryState;
      var tabLinks = new Array();
      let timer, dataTimer;
      let tabsDesktop = document.getElementById("tabs");
      let assemblyStates = document.getElementById("assembly-states");


        const fetchTabData = () => {
            clearTimeout(dataTimer);
            tabsDesktop.innerHTML = ``;
            assemblyStates.innerHTML = ``;
            fetch(
            `https://electionresults.intoday.in/elections/${feedyear}/assembly-elections/json/tally/assembly_parent_result_tally_${feedyear}.json?v=${Date.now()}`
            ).then((response) => {
                return response.json();
            }).then((data) => {
                stateTabData = data.data.state_list;
                
                if(tabsStatus == 'hide'){
                    document.querySelector('.elecResults').style.display = 'none';
                }
                for (let stateData of stateTabData) {
                    let stateName = stateData.name.split(" ").join("-").toLowerCase();
                    if (stateData[changeContentLanguage("show_state")] == 1) {                
                        tabsDesktop.innerHTML += ` <li  id="${stateName}"><a class="${stateName==selectedTab ? 'selected' : ''}" href="javascript:void(0);" data-id="${stateName}">${stateData[changeContentLanguage("name")]}</a></li>`;
                        assemblyStates.innerHTML += ` <option value="${stateName}" data-tab-sel="state_${stateName}" id="optn_state1" data-id="${stateName}"${stateName == selectedTab ? ' selected' : ''}>${stateData.name}</option>`;
                    }
                }
                fetchMapData();
            }).catch((err) => { console.log(err); fetchMapData(); });
        }
        document.getElementById("tabs").addEventListener("click", function (e) {
            const link = e.target.closest("a");
            if (!link) return;
            e.preventDefault();
            const state = link.dataset.id;
            document.querySelectorAll("#tabs a").forEach(a => a.classList.remove("selected"));
            link.classList.add("selected");
            assemblyStates.value = state;
            handleTabClick(state);
        });

        document.getElementById("assembly-states").addEventListener("change", function () {
            const state = this.value;
            if (!state) return;
            document.querySelectorAll("#tabs a").forEach(a => {
                a.classList.toggle("selected", a.dataset.id === state);
            });
            handleTabClick(state);
        });

        function handleTabClick(state) {
            if (state !== selectedTab) {
                selectedTab = state;
                document.querySelectorAll(".img-comp-slider").forEach(el => {
                    el.removeAttribute("style");
                });
                fetchMapData();
            }
        }
        fetchTabData();
    </script>
  </body>
</html>
